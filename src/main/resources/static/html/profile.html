<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC Network - Trang cá nhân</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/chat.css">
    <!-- WebSocket libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <!-- Header Navigation -->
    <header class="top-header">
        <div class="header-left">
            <a href="/html/home.html" class="logo">
                <i class="fa-solid fa-triangle-exclamation" style="rotate: 180deg; color: #00d1b2;"></i> LC Network
            </a>
            <nav class="main-nav">
                <a href="/html/home.html" class="nav-link">Trang chủ</a>
                <a href="/html/friends.html" class="nav-link">Bạn bè</a>
            </nav>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Tìm kiếm bài viết, bạn bè...">
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="nav-message-btn" onclick="toggleChatSidebar()"><i class="fa-regular fa-envelope"></i></button>
            <div class="notification-container" style="position: relative;">
                <button class="icon-btn notification-btn" onclick="toggleNotificationDropdown()">
                    <i class="fa-regular fa-bell"></i>
                    <span class="badge" id="notification-badge" style="display:none;">0</span>
                </button>
                <div id="notification-dropdown" class="notification-dropdown" style="display:none;">
                    <div class="dropdown-header">
                        <h4>Thông báo</h4>
                        <button class="mark-all-read-btn" onclick="markAllNotificationsAsRead()">Đánh dấu đã đọc</button>
                    </div>
                    <div class="dropdown-body" id="notification-list">
                        <!-- Notifications appended here dynamically -->
                    </div>
                </div>
            </div>
            <div class="user-avatar-btn">
                <img src="/uploads/default-avatar.png" alt="User Avatar" id="header-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=00d1b2&color=fff'">
            </div>
        </div>
    </header>

    <!-- Profile Container -->
    <div class="profile-container container">
        <!-- Profile Header Card (Cover, Avatar, Name) -->
        <div class="card profile-header-card">
            <div class="cover-photo">
                <img src="https://images.unsplash.com/photo-1707343843437-caacff5cfa74?q=80&w=2000&auto=format&fit=crop" alt="Cover Photo" id="profile-cover">
                <button class="edit-cover-btn"><i class="fa-solid fa-camera"></i> Thêm ảnh bìa</button>
            </div>
            
            <div class="profile-info-section">
                <div class="profile-avatar-wrapper">
                    <img src="/uploads/default-avatar.png" alt="Avatar" id="profile-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=00d1b2&color=fff'">
                    <button class="edit-avatar-btn"><i class="fa-solid fa-camera"></i></button>
                </div>
                
                <div class="profile-name-section">
                    <h1 id="profile-name">Đang tải...</h1>
                </div>
                
                <div class="profile-actions">
                    <button class="btn btn-secondary" id="btn-message" style="display:none;"><i class="fa-regular fa-envelope"></i> Nhắn tin</button>
                    <span id="friendship-actions" style="display:none;"></span>
                    <button class="btn btn-secondary" id="btn-edit-profile"><i class="fa-solid fa-pen"></i> Chỉnh sửa trang cá nhân</button>
                </div>
            </div>
            
            <div class="profile-navbar">
                <a href="#" class="active">Bài viết</a>
            </div>
        </div>

        <!-- Profile Body (Left: Intro, Right: Feed) -->
        <div class="profile-body">
            <!-- Left Sidebar -->
            <div class="profile-left">
                <div class="card intro-card">
                    <h3>Giới thiệu</h3>
                    <div class="bio-section">
                        <p class="bio-text" id="profile-bio">Chưa có tiểu sử.</p>
                    </div>
                    <ul class="intro-list">
                        <li><i class="fa-solid fa-heart"></i> Mối quan hệ: <span id="profile-relationship">---</span></li>
                        <li><i class="fa-solid fa-envelope"></i> <span id="profile-email">---</span></li>
                        <li><i class="fa-solid fa-phone"></i> SĐT: <span id="profile-phone">---</span></li>
                        <li><i class="fa-solid fa-cake-candles"></i> Sinh ngày: <span id="profile-dob">---</span></li>
                        <li><i class="fa-solid fa-mars-and-venus"></i> Giới tính: <span id="profile-gender">---</span></li>
                    </ul>
                </div>
            </div>

            <!-- Right Content (Feed) -->
            <div class="profile-right">
                <!-- Create Post Box -->
                <div class="card create-post-box">
                    <div class="create-post-top">
                        <img src="/uploads/default-avatar.png" id="create-post-avatar" alt="Avatar" class="avatar-small" onerror="this.src='https://ui-avatars.com/api/?name=User&background=00d1b2&color=fff'">
                        <input type="text" id="post-content-input" placeholder="Bạn đang nghĩ gì?" class="post-input" readonly onclick="openPostModal()">
                    </div>
                </div>

                <!-- Posts Feed -->
                <div class="posts-container" id="profile-posts-container">
                    <p style="text-align: center; color: #65676B; padding: 20px;">Đang tải bài viết...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Post Modal (Reused) -->
    <div id="create-post-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content light-mode">
            <div class="modal-header">
                <h2>Tạo bài viết</h2>
                <button class="close-modal" onclick="closePostModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="modal-user-info">
                    <img src="/uploads/default-avatar.png" id="modal-avatar" alt="Avatar" class="avatar-small">
                    <div class="modal-user-details">
                        <span class="modal-user-name">Đang tải...</span>
                        <!-- Hidden actual select for function overlapping a beautiful button -->
                        <div style="position: relative; display: inline-block;">
                            <button type="button" class="modal-visibility-btn">
                                <i class="fa-solid fa-user-group"></i>Công khai<i class="fa-solid fa-caret-down" style="font-size: 12px; margin-left: 4px;"></i>
                            </button>
                            <select id="modal-post-visibility" onchange="updateModalVisibility(this.value)" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                                <option value="PUBLIC">Công khai</option>
                                <option value="FRIENDS" selected>Bạn bè</option>
                                <option value="PRIVATE">Mình tôi</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="modal-textarea-container">
                    <textarea id="modal-post-content" placeholder="Bạn đang nghĩ gì thế?" oninput="checkModalPostContent()"></textarea>
                </div>

                <div id="modal-image-preview-container" style="display: none; position: relative; margin: 10px 0;">
                    <img id="modal-image-preview" src="" style="width: 100%; border-radius: 8px; max-height: 300px; object-fit: contain; background: #000;">
                    <button onclick="removeModalImage()" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="modal-add-to-post">
                    <span>Thêm vào bài viết của bạn</span>
                    <div class="modal-add-icons">
                        <input type="file" id="modal-image-input" accept="image/*" style="display: none;" onchange="previewModalImage(event)">
                        <button class="add-icon-btn tooltip" onclick="document.getElementById('modal-image-input').click()"><i class="fa-solid fa-images" style="color: #45bd62;"></i> Ảnh/Video</button>
                    </div>
                </div>

                <button id="modal-submit-btn" class="modal-submit-btn" disabled onclick="submitModalPost()">Đăng</button>
            </div>
        </div>
    </div>

    <!-- Chat Sidebar -->
    <div id="chat-sidebar" class="chat-sidebar">
        <div class="chat-sidebar-title">Người liên hệ</div>
        <div class="chat-sidebar-search" style="padding: 10px; border-bottom: 1px solid #ddd;">
            <input type="text" id="chat-sidebar-search-input" placeholder="Tìm kiếm người dùng..." style="width:100%; padding: 8px; border-radius: 20px; border: 1px solid #ced0d4; outline:none;" onkeyup="searchChatUsers(this.value)">
        </div>
        <div id="chat-contact-list">
            <!-- Fetch friends dynamically -->
            <div style="padding: 15px; color:#65676B; font-size:14px;">Đang tải...</div>
        </div>
    </div>

    <!-- Chat Box -->
    <div id="chat-box" class="chat-box">
        <div class="chat-header">
            <div class="chat-target-info">
                <img id="chat-target-avatar" src="/uploads/default-avatar.png">
                <span id="chat-target-name">Tên bạn bè</span>
            </div>
            <div class="chat-header-actions" onclick="closeChatBox()">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
        <div id="chat-messages-container" class="chat-messages">
            <!-- Messages here -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input-text" placeholder="Nhập tin nhắn...">
            <button onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="/js/profile.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
