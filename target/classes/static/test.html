<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBL5 - Test Database</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f5f5f5;}
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px;}
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;}
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-size: 18px; font-weight: bold; color: green; padding: 15px; border: 1px dashed #ccc; border-radius: 5px; background: #e9f7ef;}
    </style>
</head>
<body>
    <div class="card">
        <h2>🔥 Test Lấy Dữ Liệu Từ Database 🔥</h2>
        <p>Bấn vào nút bên dưới để gọi API lên máy chủ Spring Boot, nó sẽ lấy dữ liệu dưới Supabase trả về đây!</p>
        
        <button onclick="fetchData()">LẤY DỮ LIỆU TỪ DATABASE</button>
        
        <div id="result">Kết quả sẽ hiện ra ở đây...</div>
    </div>

    <script>
        function fetchData() {
            // Hàm fetch sẽ gọi API đến đường dẫn Backend Spring Boot mà mình vừa tạo
            const resultDiv = document.getElementById("result");
            resultDiv.innerText = "Đang lấy dữ liệu...";
            resultDiv.style.color = "blue";
            
            fetch("http://localhost:8080/api/get-message")
                .then(response => response.text())
                .then(data => {
                    resultDiv.innerText = data; // In kết quả API trả về ra web
                    resultDiv.style.color = "green";
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultDiv.innerText = "🚨 Lỗi! Không gọi được API. Máy chủ có mở chưa?";
                    resultDiv.style.color = "red";
                });
        }
    </script>
</body>
</html>
