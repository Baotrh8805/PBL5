<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC Network - Bạn bè</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/chat.css">
    <!-- WebSocket libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        .friends-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .friends-header { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .friend-section { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .friend-list { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .friend-card { background: white; border: 1px solid #ced0d4; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .friend-card img { width: 100%; height: 200px; object-fit: cover; }
        .friend-card-content { padding: 15px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .friend-card-name { font-weight: 600; font-size: 16px; margin-bottom: 10px; color: #050505; }
        .friend-btn { width: 100%; padding: 8px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        .btn-add { background: #e0fbf7; color: #00d1b2; }
        .btn-add:hover { background: #ccf7f0; }
        .btn-confirm { background: #00d1b2; color: white; }
        .btn-confirm:hover { background: #00b99d; }
        .btn-delete { background: #e4e6eb; color: #050505; }
        .btn-delete:hover { background: #d8dadf; }
        .nav-links-friends { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #ced0d4; padding-bottom: 10px; }
        .nav-links-friends div { font-weight: 600; color: #65676B; cursor: pointer; padding: 5px 10px; }
        .nav-links-friends div.active { color: #00d1b2; border-bottom: 3px solid #00d1b2; }
    </style>
</head>
<body>
    <!-- Header Navigation -->
    <header class="top-header">
        <div class="header-left">
            <a href="/html/home.html" class="logo">
                <i class="fa-solid fa-triangle-exclamation" style="rotate: 180deg; color: #00d1b2;"></i> LC Network
            </a>
            <nav class="main-nav">
                <a href="/html/home.html" class="nav-link">Trang chủ</a>
                <a href="/html/friends.html" class="nav-link active">Bạn bè</a>
            </nav>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Tìm kiếm bài viết, bạn bè...">
            </div>
        </div>
                <div class="header-right">
            <button class="icon-btn" id="nav-message-btn" onclick="toggleChatSidebar()"><i class="fa-regular fa-envelope"></i></button>
            <div class="notification-container" style="position: relative;">
                <button class="icon-btn notification-btn" onclick="toggleNotificationDropdown()">
                    <i class="fa-regular fa-bell"></i>
                    <span class="badge" id="notification-badge" style="display:none;">0</span>
                </button>
                <div id="notification-dropdown" class="notification-dropdown" style="display:none;">
                    <div class="dropdown-header">
                        <h4>Thông báo</h4>
                        <button class="mark-all-read-btn" onclick="markAllNotificationsAsRead()">Đánh dấu đã đọc</button>
                    </div>
                    <div class="dropdown-body" id="notification-list">
                        <!-- Notifications appended here dynamically -->
                    </div>
                </div>
            </div>
            <div class="user-avatar-btn">
                <img src="/uploads/default-avatar.png" alt="User Avatar" id="header-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=00d1b2&color=fff'">
            </div>
        </div>
    </header>

    <div class="friends-container">
        <div class="nav-links-friends">
            <div id="tab-suggestions" class="active" onclick="switchTab('suggestions')">Gợi ý kết bạn</div>
            <div id="tab-requests" onclick="switchTab('requests')">Lời mời kết bạn</div>
            <div id="tab-friends" onclick="switchTab('friends')">Bạn bè của tôi</div>
        </div>

        <div id="section-suggestions" class="friend-section">
            <h2 class="friends-header">Những người bạn có thể biết</h2>
            <div id="suggestions-list" class="friend-list">Đang tải...</div>
        </div>

        <div id="section-requests" class="friend-section" style="display: none;">
            <h2 class="friends-header">Lời mời đã nhận</h2>
            <div id="requests-list" class="friend-list">Đang tải...</div>
        </div>

        <div id="section-friends" class="friend-section" style="display: none;">
            <h2 class="friends-header">Danh sách bạn bè</h2>
            <div id="my-friends-list" class="friend-list">Đang tải...</div>
        </div>
    </div>

    <!-- Chat Sidebar -->
    <div id="chat-sidebar" class="chat-sidebar">
        <div class="chat-sidebar-title">Người liên hệ</div>
        <div class="chat-sidebar-search" style="padding: 10px; border-bottom: 1px solid #ddd;">
            <input type="text" id="chat-sidebar-search-input" placeholder="Tìm kiếm người dùng..." style="width:100%; padding: 8px; border-radius: 20px; border: 1px solid #ced0d4; outline:none;" onkeyup="searchChatUsers(this.value)">
        </div>
        <div id="chat-contact-list">
            <div style="padding: 15px; color:#65676B; font-size:14px;">Đang tải...</div>
        </div>
    </div>

    <!-- Chat Box -->
    <div id="chat-box" class="chat-box">
        <div class="chat-header">
            <div class="chat-target-info">
                <img id="chat-target-avatar" src="/uploads/default-avatar.png">
                <span id="chat-target-name">Tên bạn bè</span>
            </div>
            <div class="chat-header-actions" onclick="closeChatBox()">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
        <div id="chat-messages-container" class="chat-messages">
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input-text" placeholder="Nhập tin nhắn...">
            <button onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
    <!-- Scripts -->
    <script src="/js/friends.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
