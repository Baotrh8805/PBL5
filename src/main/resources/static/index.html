<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBL5 - Test Connection</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Kết Nối Thành Công!</h1>
        <p>Giao diện này đang chạy trên máy chủ Java Spring Boot.</p>
        
        <div class="test-box">
            <h3>Test Giao Tiếp (Client ↔ Server)</h3>
            <div id="status-badge" class="badge">Đang chờ phản hồi...</div>
            <button id="ping-btn" class="btn">Gửi lệnh "Ping" lên Server</button>
            <p id="server-response" class="response-text"></p>
        </div>
        
        <div class="info-box">
            <p><strong>Cấu trúc:</strong> MVC (Spring Boot, HTML, CSS, JS)</p>
            <p>Mở giao diện này trên điện thoại chung Wi-Fi thành công!</p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
